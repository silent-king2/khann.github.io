<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Buat Website - Silent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {margin:0;font-family:'Poppins',sans-serif;background:#111;color:#e0e0e0;}
    .container {max-width:480px;margin:40px auto;background:#1f1f1f;padding:24px;border-radius:16px;}
    h2 {text-align:center;font-size:20px;color:#00ffff;margin-bottom:24px;}
    label {display:block;margin:12px 0 4px;font-size:14px;color:#bbb;}
    input,button {width:100%;padding:12px;font-size:14px;border-radius:10px;border:none;background:#2a2a2a;color:#fff;}
    button {margin-top:18px;background:#00c17b;font-weight:600;} button:hover{background:#00a46c;}
    #result {margin-top:20px;text-align:center;font-size:13px;color:#00ffff;}
  </style>
</head>
<body>
  <div class="container">
    <h2>🚀 Buat Website Otomatis</h2>
    <form id="deployForm">
      <label>Nama Website</label>
      <input type="text" id="siteName" placeholder="contoh: mywebkeren" required>
      <label>Upload File HTML</label>
      <input type="file" id="htmlFile" accept=".html" required>
      <button type="submit">CREATE SEKARANG</button>
    </form>
    <div id="result"></div>
  </div>

  <script>
  document.getElementById("deployForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const siteName = document.getElementById("siteName").value.trim();
    const file = document.getElementById("htmlFile").files[0];
    const resultDiv = document.getElementById("result");
    if (!siteName || !file) return alert("Isi nama dan upload file!");

    const htmlText = await file.text();
    resultDiv.textContent = "⏳ Proses deploy...";

    try {
      const res = await fetch("/api/deploy", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ siteName, htmlContent: htmlText })
      });
      const data = await res.json();
      if (res.ok && data.url) {
        resultDiv.innerHTML = `✅ Website berhasil:<br><a href="${data.url}" target="_blank">${data.url}</a>`;
      } else {
        resultDiv.textContent = "❌ " + (data.error || "Gagal deploy");
      }
    } catch (err) {
      resultDiv.textContent = "❌ Error: " + (err.message || err);
    }
  });
  </script>
</body>
</html>
